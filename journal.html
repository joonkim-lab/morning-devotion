<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Journal · 묵상 기록</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #fafaf7;
    --surface: #ffffff;
    --surface-2: #f3f2ec;
    --line: #e6e4dc;
    --line-soft: #efede5;
    --text: #1a1a17;
    --text-soft: #5c5a52;
    --text-faint: #908d83;
    --accent: #1d4d52;
    --accent-soft: #4a7e83;
    --accent-bg: #e9f0f0;
    --accent-bg-deep: #d6e4e5;
  }
  
  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }
  
  .container {
    max-width: 680px;
    margin: 0 auto;
    padding: 40px 24px 80px;
  }
  
  /* 헤더 */
  .masthead { margin-bottom: 40px; }
  
  .date-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 24px;
    font-size: 13px;
    color: var(--text-faint);
  }
  .date-row .day { color: var(--accent); font-weight: 600; }
  
  .masthead h1 {
    font-family: 'Fraunces', serif;
    font-weight: 500;
    font-size: 52px;
    line-height: 0.95;
    letter-spacing: -0.03em;
    margin-bottom: 12px;
  }
  .masthead .subtitle {
    font-size: 16px;
    color: var(--text-soft);
    line-height: 1.5;
  }
  
  /* 묵상 기록 섹션 */
  .record-section {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 24px;
    margin-bottom: 28px;
  }
  
  .record-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 20px;
  }
  .record-title {
    font-size: 14px;
    font-weight: 700;
    color: var(--text);
  }
  .record-period {
    font-size: 12px;
    color: var(--text-faint);
  }
  
  /* 통계 — 차분한 표시 */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1px;
    background: var(--line-soft);
    border-radius: 8px;
    overflow: hidden;
    margin-bottom: 22px;
  }
  .stat-cell {
    background: var(--bg);
    padding: 14px 8px;
    text-align: center;
  }
  .stat-num {
    font-family: 'Fraunces', serif;
    font-weight: 500;
    font-size: 22px;
    color: var(--accent);
    line-height: 1;
    margin-bottom: 4px;
  }
  .stat-num .stat-unit {
    font-size: 12px;
    color: var(--text-faint);
    margin-left: 2px;
    font-weight: 400;
  }
  .stat-label {
    font-size: 10px;
    color: var(--text-faint);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  
  /* 달력 */
  .calendar {
    background: var(--bg);
    border-radius: 8px;
    padding: 14px;
  }
  .calendar-month {
    text-align: center;
    font-size: 12px;
    color: var(--text-faint);
    margin-bottom: 10px;
    font-weight: 500;
  }
  .calendar-weekdays {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
    margin-bottom: 6px;
  }
  .weekday {
    text-align: center;
    font-size: 10px;
    color: var(--text-faint);
    padding: 4px 0;
  }
  .calendar-days {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
  }
  .day-cell {
    aspect-ratio: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    border-radius: 6px;
    color: var(--text-faint);
    position: relative;
  }
  .day-cell.empty {
    background: transparent;
  }
  .day-cell.past {
    background: var(--surface);
    color: var(--text-faint);
  }
  .day-cell.opened {
    background: var(--accent-bg);
    color: var(--accent);
    font-weight: 500;
  }
  .day-cell.engaged {
    background: var(--accent);
    color: white;
    font-weight: 600;
  }
  .day-cell.today {
    border: 1.5px solid var(--accent);
  }
  .day-cell.today:not(.engaged):not(.opened) {
    background: var(--surface);
  }
  
  /* 범례 */
  .legend {
    display: flex;
    justify-content: center;
    gap: 16px;
    margin-top: 12px;
    font-size: 10px;
    color: var(--text-faint);
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 3px;
  }
  .legend-dot.opened { background: var(--accent-bg); border: 1px solid var(--accent-soft); }
  .legend-dot.engaged { background: var(--accent); }
  
  /* 카드 */
  .cards {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  
  .card {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 26px 22px;
    text-decoration: none;
    color: inherit;
    display: block;
    position: relative;
    transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
  }
  .card:hover, .card:active {
    transform: translateY(-1px);
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.04);
    border-color: var(--accent-soft);
  }
  
  .card-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
  }
  .card-num {
    font-family: 'Fraunces', serif;
    font-size: 12px;
    color: var(--text-faint);
  }
  .card-status {
    font-size: 11px;
    padding: 3px 9px;
    border-radius: 99px;
    font-weight: 500;
  }
  .status-ready { background: var(--accent-bg); color: var(--accent); }
  .status-soon { background: var(--surface-2); color: var(--text-faint); }
  
  .card-title {
    font-family: 'Fraunces', serif;
    font-weight: 500;
    font-size: 26px;
    letter-spacing: -0.025em;
    line-height: 1.1;
    margin-bottom: 4px;
  }
  .card-title-ko {
    font-size: 14px;
    color: var(--text-faint);
    margin-bottom: 14px;
  }
  .card-desc {
    font-size: 13px;
    color: var(--text-soft);
    line-height: 1.55;
    padding-top: 14px;
    border-top: 1px solid var(--line-soft);
  }
  .card-cta {
    margin-top: 12px;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    color: var(--accent);
    font-weight: 500;
  }
  .card-cta-soon { color: var(--text-faint); }
  
  .footer {
    margin-top: 56px;
    text-align: center;
    font-size: 12px;
    color: var(--text-faint);
  }
  
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .masthead { animation: fadeUp 0.4s ease both; }
  .record-section { animation: fadeUp 0.4s ease 0.05s both; }
  .card:nth-child(1) { animation: fadeUp 0.4s ease 0.1s both; }
  .card:nth-child(2) { animation: fadeUp 0.4s ease 0.15s both; }
  .card:nth-child(3) { animation: fadeUp 0.4s ease 0.2s both; }
  
  @media (max-width: 480px) {
    .container { padding: 28px 16px 70px; }
    .masthead h1 { font-size: 42px; }
    .stat-num { font-size: 20px; }
    .card { padding: 22px 18px; }
    .card-title { font-size: 22px; }
  }
</style>
</head>
<body>

<div class="container">

  <header class="masthead">
    <div class="date-row">
      <span id="todayDate"></span>
      <span class="day" id="todayDay"></span>
    </div>
    <h1>Journal</h1>
    <p class="subtitle">머무름의 흔적이 쌓이는 자리</p>
  </header>

  <!-- 묵상 기록 -->
  <section class="record-section">
    <div class="record-header">
      <span class="record-title">묵상 기록</span>
      <span class="record-period" id="recordPeriod"></span>
    </div>
    
    <div class="stats-grid">
      <div class="stat-cell">
        <div class="stat-num"><span id="streakNum">0</span><span class="stat-unit">일</span></div>
        <div class="stat-label">연속</div>
      </div>
      <div class="stat-cell">
        <div class="stat-num"><span id="totalNum">0</span><span class="stat-unit">일</span></div>
        <div class="stat-label">누적</div>
      </div>
      <div class="stat-cell">
        <div class="stat-num"><span id="monthRate">0</span><span class="stat-unit">%</span></div>
        <div class="stat-label">이번 달</div>
      </div>
    </div>
    
    <div class="calendar">
      <div class="calendar-month" id="calendarMonth"></div>
      <div class="calendar-weekdays">
        <div class="weekday">일</div>
        <div class="weekday">월</div>
        <div class="weekday">화</div>
        <div class="weekday">수</div>
        <div class="weekday">목</div>
        <div class="weekday">금</div>
        <div class="weekday">토</div>
      </div>
      <div class="calendar-days" id="calendarDays"></div>
      <div class="legend">
        <div class="legend-item">
          <div class="legend-dot opened"></div>
          <span>열람</span>
        </div>
        <div class="legend-item">
          <div class="legend-dot engaged"></div>
          <span>응답</span>
        </div>
      </div>
    </div>
  </section>

  <div style="margin-top: 28px; text-align: center;">
    <a href="index.html" style="display: inline-flex; align-items: center; gap: 8px; padding: 14px 28px; background: var(--accent); color: white; text-decoration: none; border-radius: 10px; font-size: 15px; font-weight: 500;">
      ← 묵상으로 돌아가기
    </a>
  </div>
  
  <p class="footer">Soli Deo Gloria</p>
  
</div>

<script>
// ═════════════════════════════════════════════════════════
// 날짜 헬퍼
// ═════════════════════════════════════════════════════════

const today = new Date();
const todayKey = formatDateKey(today);

function formatDateKey(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function getRecordLevel(dateKey) {
  // 2 = engaged (답 적음), 1 = opened (페이지 열림), 0 = 없음
  if (localStorage.getItem(`devotion-engaged-${dateKey}`)) return 2;
  if (localStorage.getItem(`devotion-opened-${dateKey}`)) return 1;
  return 0;
}

// ═════════════════════════════════════════════════════════
// 헤더 날짜
// ═════════════════════════════════════════════════════════

const monthsEn = ['January', 'February', 'March', 'April', 'May', 'June',
  'July', 'August', 'September', 'October', 'November', 'December'];
const daysKo = ['일요일', '월요일', '화요일', '수요일', '목요일', '금요일', '토요일'];
const daysEn = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];

document.getElementById('todayDate').textContent = 
  `${monthsEn[today.getMonth()]} ${today.getDate()}, ${today.getFullYear()}`;
document.getElementById('todayDay').textContent = 
  `${daysKo[today.getDay()]} · ${daysEn[today.getDay()]}`;

// ═════════════════════════════════════════════════════════
// 통계 계산
// ═════════════════════════════════════════════════════════

function calculateStats() {
  let total = 0;
  let streak = 0;
  let monthOpened = 0;
  
  // 1. 누적 — localStorage 전체 검색
  const allKeys = [];
  for (let i = 0; i < localStorage.length; i++) {
    const k = localStorage.key(i);
    if (k.startsWith('devotion-opened-') || k.startsWith('devotion-engaged-')) {
      allKeys.push(k);
    }
  }
  
  // 고유 날짜 추출 (등급 1 이상)
  const recordedDates = new Set();
  allKeys.forEach(k => {
    const match = k.match(/devotion-(opened|engaged)-(\d{4}-\d{2}-\d{2})/);
    if (match) recordedDates.add(match[2]);
  });
  total = recordedDates.size;
  
  // 2. 연속 — 오늘부터 거꾸로
  let cur = new Date(today);
  while (true) {
    const key = formatDateKey(cur);
    if (getRecordLevel(key) > 0) {
      streak++;
      cur.setDate(cur.getDate() - 1);
    } else {
      // 오늘 0이면 어제부터 시작 (오늘 아직 안 한 경우)
      if (formatDateKey(cur) === todayKey && streak === 0) {
        cur.setDate(cur.getDate() - 1);
        continue;
      }
      break;
    }
  }
  
  // 3. 이번 달 활동률
  const year = today.getFullYear();
  const month = today.getMonth();
  const todayDate = today.getDate();
  
  for (let d = 1; d <= todayDate; d++) {
    const dt = new Date(year, month, d);
    const key = formatDateKey(dt);
    if (getRecordLevel(key) > 0) monthOpened++;
  }
  
  const monthRate = todayDate > 0 ? Math.round((monthOpened / todayDate) * 100) : 0;
  
  return { total, streak, monthOpened, monthRate };
}

// ═════════════════════════════════════════════════════════
// 달력 그리기
// ═════════════════════════════════════════════════════════

function renderCalendar() {
  const year = today.getFullYear();
  const month = today.getMonth();
  
  // 월 이름
  document.getElementById('calendarMonth').textContent = 
    `${year}. ${String(month + 1).padStart(2, '0')}`;
  document.getElementById('recordPeriod').textContent = 
    `${monthsEn[month]} ${year}`;
  
  // 1일 요일
  const firstDay = new Date(year, month, 1);
  const startWeekday = firstDay.getDay();
  
  // 이번 달 마지막 날
  const lastDay = new Date(year, month + 1, 0);
  const daysInMonth = lastDay.getDate();
  
  const daysEl = document.getElementById('calendarDays');
  daysEl.innerHTML = '';
  
  // 빈 칸 (1일 앞)
  for (let i = 0; i < startWeekday; i++) {
    const cell = document.createElement('div');
    cell.className = 'day-cell empty';
    daysEl.appendChild(cell);
  }
  
  // 각 날짜
  for (let d = 1; d <= daysInMonth; d++) {
    const cell = document.createElement('div');
    cell.className = 'day-cell';
    cell.textContent = d;
    
    const dt = new Date(year, month, d);
    const key = formatDateKey(dt);
    const level = getRecordLevel(key);
    
    if (level === 2) cell.classList.add('engaged');
    else if (level === 1) cell.classList.add('opened');
    else if (d <= today.getDate()) cell.classList.add('past');
    
    if (key === todayKey) cell.classList.add('today');
    
    daysEl.appendChild(cell);
  }
}

// ═════════════════════════════════════════════════════════
// 렌더링
// ═════════════════════════════════════════════════════════

function render() {
  const stats = calculateStats();
  
  document.getElementById('streakNum').textContent = stats.streak;
  document.getElementById('totalNum').textContent = stats.total;
  document.getElementById('monthRate').textContent = stats.monthRate;
  
  renderCalendar();
}

render();
</script>

</body>
</html>
